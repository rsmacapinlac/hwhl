---
# Default variables for Nextcloud AIO
# Can be overridden in host_vars or group_vars

# Data directory for Nextcloud
nextcloud_data_dir: /data/NextCloud

# Master container port (AIO management interface)
nextcloud_port: 8080

# Apache port (internal reverse proxy port)
nextcloud_apache_port: 11000

# IP of an external reverse proxy (on a separate host) that fronts this instance.
# When set, it is added to Nextcloud trusted_proxies so the real client IP is read
# from X-Forwarded-For; otherwise all traffic is attributed to the proxy and
# triggers brute-force login throttling. Leave empty when there is no external
# proxy (e.g. AIO is accessed directly). Set the site-specific value in inventory.
nextcloud_reverse_proxy_ip: ""

# When true, Cloudflare's published edge IP ranges are added to trusted_proxies so
# the real client IP is read from X-Forwarded-For when the instance is fronted by
# Cloudflare (proxied DNS / tunnel). Enable per-site in inventory. Not site-specific
# (Cloudflare ranges are global), so the list lives here in role defaults.
nextcloud_trust_cloudflare: false

# Cloudflare edge IP ranges. Source: https://www.cloudflare.com/ips-v4 and
# https://www.cloudflare.com/ips-v6 (Cloudflare updates these rarely; refresh if
# the published lists change).
nextcloud_cloudflare_ips:
  # IPv4
  - 173.245.48.0/20
  - 103.21.244.0/22
  - 103.22.200.0/22
  - 103.31.4.0/22
  - 141.101.64.0/18
  - 108.162.192.0/18
  - 190.93.240.0/20
  - 188.114.96.0/20
  - 197.234.240.0/22
  - 198.41.128.0/17
  - 162.158.0.0/15
  - 104.16.0.0/13
  - 104.24.0.0/14
  - 172.64.0.0/13
  - 131.0.72.0/22
  # IPv6
  - 2400:cb00::/32
  - 2606:4700::/32
  - 2803:f800::/32
  - 2405:b500::/32
  - 2405:8100::/32
  - 2a06:98c0::/29
  - 2c0f:f248::/32
