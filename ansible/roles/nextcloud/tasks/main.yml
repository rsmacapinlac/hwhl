---
# Environment file validation
- name: Check if environment file exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../homelab_config/ansible/files/config/nextcloud/environment"
  register: env_file
  delegate_to: localhost
  become: false

- name: Fail if environment file doesn't exist
  fail:
    msg: |
      Environment file not found at {{ playbook_dir }}/../homelab_config/ansible/files/config/nextcloud/environment
      Please run site-setup.yml first to create the environment file.
  when: not env_file.stat.exists

# Container status checking (Nextcloud AIO uses specific container name)
- name: Check if nextcloud-aio-mastercontainer exists
  community.docker.docker_container_info:
    name: nextcloud-aio-mastercontainer
  register: service_container
  ignore_errors: true

# Directory creation with proper permissions (MUST run unconditionally)
- name: Create services folder
  become: true
  ansible.builtin.file:
    path: /data/services/nextcloud
    state: directory
    owner: ansible
    group: docker
    mode: '0755'

# Environment file deployment (triggers handler when changed)
- name: Copy environment configuration
  copy:
    src: "{{ playbook_dir }}/../homelab_config/ansible/files/config/nextcloud/environment"
    dest: /data/services/nextcloud/.env
    owner: ansible
    group: docker
    mode: '0640'
  notify: restart nextcloud

# Docker Compose deployment (MUST run unconditionally for handlers to work)
- name: Setup docker compose file for Nextcloud AIO
  template:
    src: docker-compose.j2
    dest: /data/services/nextcloud/compose.yml
    owner: ansible
    group: docker
    mode: '0644'
  notify: restart nextcloud

# Container deployment using docker_compose_v2 (ONLY this task is conditional)
- name: Run nextcloud container
  community.docker.docker_compose_v2:
    project_src: /data/services/nextcloud
    files:
      - compose.yml
    state: present
    remove_orphans: false
  when: not service_container.container.State.Running | default(false)
  notify: restart nextcloud

# Reverse proxy trust: AIO seeds trusted_proxies with localhost and its internal
# docker network only. When fronted by an upstream proxy (the external edge proxy
# on another host, and/or Cloudflare), each such hop's IP must also be trusted or
# Nextcloud attributes every request to the immediate proxy and brute-force
# throttles all users. The edge proxy IP is site-specific (nextcloud_reverse_proxy_ip);
# Cloudflare's ranges are added when nextcloud_trust_cloudflare is true. Both are
# supplied via inventory and the whole block is skipped when neither yields entries.
# Only runs once the AIO child container exists (not on a fresh install still spinning up).
- name: Build desired Nextcloud trusted_proxies entries
  ansible.builtin.set_fact:
    nextcloud_desired_proxies: >-
      {{ ([nextcloud_reverse_proxy_ip] if nextcloud_reverse_proxy_ip | length > 0 else [])
         + (nextcloud_cloudflare_ips if nextcloud_trust_cloudflare | bool else []) }}

- name: Check if nextcloud-aio-nextcloud child container is running
  community.docker.docker_container_info:
    name: nextcloud-aio-nextcloud
  register: nextcloud_child_container
  ignore_errors: true
  when: nextcloud_desired_proxies | length > 0

- name: Get current Nextcloud trusted_proxies
  become: true
  ansible.builtin.command:
    cmd: docker exec --user www-data nextcloud-aio-nextcloud php occ config:system:get trusted_proxies
  register: nextcloud_trusted_proxies
  changed_when: false
  check_mode: false
  when:
    - nextcloud_desired_proxies | length > 0
    - nextcloud_child_container.container.State.Running | default(false)

# occ stores trusted_proxies as a plain array but its "set by index" primitive is
# unreliable for bulk edits: writing several indices in one pass collides and can
# drop a pre-existing entry (e.g. the internal docker-network range). Order is
# irrelevant to Nextcloud (it is a membership set), so the only deterministic way
# to add entries is to delete the key and rebuild it from empty. We only do this
# when something is actually missing, which keeps the task idempotent and preserves
# whatever AIO seeded (those entries are carried through in nextcloud_final_proxies).
- name: Compute missing trusted_proxies entries
  ansible.builtin.set_fact:
    nextcloud_missing_proxies: "{{ nextcloud_desired_proxies | reject('in', nextcloud_trusted_proxies.stdout_lines) | list }}"
    nextcloud_final_proxies: "{{ nextcloud_trusted_proxies.stdout_lines + (nextcloud_desired_proxies | reject('in', nextcloud_trusted_proxies.stdout_lines) | list) }}"
  when:
    - nextcloud_desired_proxies | length > 0
    - nextcloud_child_container.container.State.Running | default(false)

- name: Ensure upstream proxy IPs are in Nextcloud trusted_proxies
  become: true
  ansible.builtin.shell:
    cmd: |
      set -eu
      docker exec --user www-data nextcloud-aio-nextcloud php occ config:system:delete trusted_proxies
      i=0
      for v in {{ nextcloud_final_proxies | join(' ') }}; do
        docker exec --user www-data nextcloud-aio-nextcloud \
          php occ config:system:set trusted_proxies "$i" --value="$v" >/dev/null
        i=$((i + 1))
      done
      echo "set ${i} trusted_proxies entries"
  when:
    - nextcloud_desired_proxies | length > 0
    - nextcloud_child_container.container.State.Running | default(false)
    - nextcloud_missing_proxies | length > 0
