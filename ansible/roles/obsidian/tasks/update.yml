---
- name: Update obsidian container with latest image
  community.docker.docker_compose_v2:
    project_src: /data/services/obsidian
    files:
      - compose.yml
    state: present
    pull: always
    recreate: always
    remove_orphans: false
  register: compose_update
  ignore_errors: true

- name: Wait for obsidian container to be running
  community.docker.docker_container_info:
    name: obsidian
  register: obsidian_status
  until: obsidian_status.container.State.Running | default(false)
  retries: 5
  delay: 2
  when: compose_update is succeeded

- name: Remove dangling obsidian images
  command: docker image prune -f
  changed_when: true
  when: compose_update is succeeded
